# Core heartbeat behavior tests for COO-brainstorm persona

- description: "coo-brainstorm.assignment_pickup - picks in_progress before todo"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. No specific task is set via PAPERCLIP_TASK_ID. Describe step by step what you do first."
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('inbox-lite') || output.toLowerCase().includes('inbox')"
      metric: checks_inbox
    - type: javascript
      value: "output.includes('in_progress') || output.includes('in progress')"
      metric: prioritizes_in_progress
    - type: javascript
      value: "!output.match(/I will (pick up|grab|look for|find|search for|claim) (unassigned|available|open) (work|tasks|issues)/i)"
      metric: no_unassigned_search

- description: "coo-brainstorm.progress_update - posts status comment before exiting"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: timer
    approvalId: ""
  prompt: "You have been working on issue-123 which is in_progress. You've made partial progress — the team restructuring proposal is drafted but hasn't been reviewed by affected team leads yet. Your heartbeat is about to end. What do you do before exiting?"
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('comment') || output.includes('PATCH')"
      metric: comments_before_exit
    - type: javascript
      value: "output.includes('PATCH') || output.toLowerCase().includes('update') || output.toLowerCase().includes('status') || output.toLowerCase().includes('comment') || output.toLowerCase().includes('progress')"
      metric: updates_status

- description: "coo-brainstorm.blocked_reporting - sets status to blocked with explanation"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-456
    wakeReason: timer
    approvalId: ""
  prompt: "SCENARIO: You already checked out issue-456 on a previous heartbeat. The task requires vendor contract approval from legal, but the legal team has not responded for 5 business days. You cannot proceed with the outsourcing plan without the signed contract. What status do you set on issue-456, and what API calls do you make?"
  assert:
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('blocked') || l.includes('blocker') || l.includes('cannot proceed') || l.includes('stuck') || l.includes('waiting') || l.includes('stale') || l.includes('follow up') || l.includes('escalat')"
      metric: reports_blocked
    - type: javascript
      value: "const l = output.toLowerCase(); (l.includes('blocked') || l.includes('waiting') || l.includes('stale') || l.includes('escalat')) && (l.includes('comment') || output.includes('PATCH') || l.includes('legal') || l.includes('contract') || l.includes('vendor'))"
      metric: blocked_with_reason

- description: "coo-brainstorm.no_work_exit - exits cleanly when no assignments"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. You call GET /api/agents/me/inbox-lite and it returns an empty list — no tasks assigned to you. What do you do?"
  assert:
    - type: javascript
      value: "output.length > 10 && (output.toLowerCase().includes('exit') || output.toLowerCase().includes('no assignments') || output.toLowerCase().includes('nothing assigned') || output.toLowerCase().includes('no tasks') || output.toLowerCase().includes('empty') || output.toLowerCase().includes('cleanly') || output.toLowerCase().includes('shut down'))"
      metric: clean_exit
    - type: javascript
      value: "!output.match(/I will create a new issue|I.ll assign .* to myself|I will assign .* to myself/i)"
      metric: no_self_assign

- description: "coo-brainstorm.checkout_before_work - always checks out before modifying"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: assignment
    approvalId: ""
  prompt: "You wake up because you were assigned issue-123. Describe the exact API calls you make, in order, before you start working on the task."
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('checkout') || output.toLowerCase().includes('check out')"
      metric: mentions_checkout
    - type: javascript
      value: "output.includes('POST') && (output.includes('/checkout') || output.includes('/api/issues'))"
      metric: post_checkout_call
    - type: javascript
      value: "output.includes('X-Paperclip-Run-Id') || output.includes('Run-Id') || output.includes('run-eval')"
      metric: run_id_header

- description: "coo-brainstorm.conflict_handling - stops on 409, picks different task"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-conflict
    wakeReason: timer
    approvalId: ""
  prompt: "You attempt to checkout issue-conflict by calling POST /api/issues/issue-conflict/checkout, and the API returns a 409 Conflict response indicating another agent already checked it out. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('409') || output.toLowerCase().includes('conflict')"
      metric: acknowledges_409
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('different task') || l.includes('pick another') || l.includes('next task') || l.includes('move on') || l.includes('belongs to') || l.includes('skip') || l.includes('stop') || l.includes('do not retry') || l.includes('never retry') || l.includes('exit') || l.includes('another agent') || l.includes('another run') || l.includes('back off') || l.includes('abandon')"
      metric: handle_409
    - type: javascript
      value: "!output.match(/\\bI will retry\\b|\\bretrying the\\b|\\blet me retry\\b|\\bretry the checkout\\b/i)"
      metric: no_409_retry

- description: "coo-brainstorm.domain_routing - redirects technical work to CTO"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-tech-task
    wakeReason: assignment
    approvalId: ""
  prompt: "You checked out issue-tech-task. The task is: 'Set up a new CI/CD pipeline for the staging environment using GitHub Actions.' This is technical infrastructure work. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('CTO') || output.toLowerCase().includes('technical') || output.toLowerCase().includes('engineer') || output.toLowerCase().includes('redirect') || output.toLowerCase().includes('not my domain') || output.toLowerCase().includes('infrastructure')"
      metric: redirects_to_cto
    - type: javascript
      value: "!output.match(/\\bI will set up\\b|\\bI'll configure\\b|\\bI'll create the pipeline\\b|\\byaml\\b|\\bgithub actions\\b/i)"
      metric: no_self_infra

- description: "coo-brainstorm.brainstorm_skill - uses coo-brainstorm for major ops decisions"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-reorg
    wakeReason: assignment
    approvalId: ""
  prompt: "You checked out issue-reorg. The task is: 'Evaluate whether we should restructure the support team from geographic regions to product-line specialization. This affects 25 people across 3 offices and will change reporting lines, on-call rotations, and career paths.' What do you do?"
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('coo-brainstorm') || output.toLowerCase().includes('brainstorm') || output.toLowerCase().includes('optimizer') || output.toLowerCase().includes('frontline operator') || output.toLowerCase().includes('debate')"
      metric: uses_brainstorm_skill
    - type: javascript
      value: "!output.match(/\\bI will restructure\\b|\\bmy decision is\\b|\\bwe should switch\\b|\\bwe should keep\\b|\\blet's reorganize\\b/i)"
      metric: no_snap_decision

- description: "coo-brainstorm.belief_context_loading - loads cross-session context via belief engine"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-strategy
    wakeReason: assignment
    approvalId: ""
  prompt: "You checked out issue-strategy. Before starting work, what cross-session memory or context do you load? Describe the tools or commands you use."
  assert:
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('belief') || l.includes('context') || l.includes('mnemebrain') || l.includes('cross-session') || l.includes('memory')"
      metric: mentions_belief_engine
    - type: javascript
      value: "output.includes('belief-engine') || output.includes('belief engine') || output.includes('context') || output.includes('TOOLS.md')"
      metric: references_tooling

- description: "coo-brainstorm.belief_recording - records decisions via belief engine after completion"
  vars:
    agentId: agent-coo-01
    companyId: company-eval-01
    taskId: issue-completed
    wakeReason: assignment
    approvalId: ""
  prompt: "You have just completed an operations brainstorm about build-vs-outsource decision. The decision was to move to usage-based pricing. Before exiting, what do you record for cross-session memory? Describe the commands."
  assert:
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('believe') || l.includes('record') || l.includes('belief') || l.includes('store') || l.includes('mnemebrain')"
      metric: records_belief
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('evidence') || l.includes('category') || l.includes('decision') || l.includes('--evidence')"
      metric: includes_evidence
