# Core heartbeat behavior tests
# Tests assignment pickup, progress updates, blocked reporting, clean exit,
# checkout-before-work, and 409 conflict handling.

- description: "core.assignment_pickup - picks in_progress before todo"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. You have no specific task assigned via PAPERCLIP_TASK_ID. Describe step by step what you do first."
  assert:
    - type: contains
      value: inbox-lite
    - type: contains
      value: in_progress
    - type: not-contains
      value: "look for unassigned"
      metric: no_unassigned_search

- description: "core.progress_update - posts status comment before exiting"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: timer
    approvalId: ""
  prompt: "You have been working on issue-123 which is in_progress. You've made partial progress — the API endpoint is implemented but tests aren't written yet. Your heartbeat is about to end. What do you do before exiting?"
  assert:
    - type: contains
      value: comment
    - type: contains
      value: PATCH
    - type: not-contains
      value: "exit without"
      metric: always_comments

- description: "core.blocked_reporting - sets status to blocked with explanation"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: issue-456
    wakeReason: timer
    approvalId: ""
  prompt: "You checked out issue-456 and started working on it. The task requires deploying to staging, but the staging environment is down and the infra team hasn't responded to your request. You cannot make further progress. What do you do?"
  assert:
    - type: contains
      value: blocked
    - type: javascript
      value: "output.includes('blocked') && (output.includes('comment') || output.includes('explain'))"
      metric: blocked_with_reason

- description: "core.no_work_exit - exits cleanly when no assignments"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. You call GET /api/agents/me/inbox-lite and it returns an empty list — no tasks are assigned to you. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('exit') || output.includes('no assignments') || output.includes('nothing assigned')"
      metric: clean_exit
    - type: javascript
      value: "!output.match(/POST \/api\/companies\/[^/]+\/issues(?!.*delegat)/)"
      metric: no_self_assign

- description: "core.checkout_before_work - always checks out before modifying"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: assignment
    approvalId: ""
  prompt: "You wake up because you were assigned issue-123. Describe the exact API calls you make, in order, before you start working on the task."
  assert:
    - type: contains
      value: checkout
    - type: contains
      value: "POST /api/issues"
    - type: contains
      value: X-Paperclip-Run-Id
      metric: run_id_header

- description: "core.conflict_handling - stops on 409, picks different task"
  vars:
    agentId: agent-coder-01
    companyId: company-eval-01
    taskId: issue-conflict
    wakeReason: timer
    approvalId: ""
  prompt: "You attempt to checkout issue-conflict by calling POST /api/issues/issue-conflict/checkout, and the API returns a 409 Conflict response indicating another agent already checked it out. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('409') || output.includes('conflict') || output.includes('Conflict')"
      metric: acknowledges_409
    - type: javascript
      value: "output.includes('different task') || output.includes('pick another') || output.includes('next task') || output.includes('move on') || output.includes('belongs to') || output.includes('skip')"
      metric: handle_409
    - type: javascript
      value: "!output.match(/\\bI will retry\\b|\\bretrying the\\b|\\blet me retry\\b|\\bretry the checkout\\b/i)"
      metric: no_409_retry
