# Core heartbeat behavior tests for CEO-brainstorm persona (English)

- description: "ceo-brainstorm.assignment_pickup - picks in_progress before todo"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. No specific task is set via PAPERCLIP_TASK_ID. Describe step by step what you do first."
  assert:
    - type: contains
      value: inbox-lite
    - type: javascript
      value: "output.includes('in_progress') || output.includes('in progress')"
      metric: prioritizes_in_progress
    - type: javascript
      value: "!output.match(/I will (pick up|grab|look for|find|search for|claim) (unassigned|available|open) (work|tasks|issues)/i)"
      metric: no_unassigned_search

- description: "ceo-brainstorm.progress_update - posts status comment before exiting"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: timer
    approvalId: ""
  prompt: "You have been working on issue-123 which is in_progress. You've made partial progress — the subtask was delegated to CTO but no update yet. Your heartbeat is about to end. What do you do before exiting?"
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('comment') || output.includes('PATCH')"
      metric: comments_before_exit
    - type: javascript
      value: "output.includes('PATCH') || output.toLowerCase().includes('update') || output.toLowerCase().includes('status') || output.toLowerCase().includes('comment') || output.toLowerCase().includes('delegat') || output.toLowerCase().includes('progress')"
      metric: updates_status

- description: "ceo-brainstorm.blocked_reporting - sets status to blocked with explanation"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-456
    wakeReason: timer
    approvalId: ""
  prompt: "SCENARIO: You already checked out issue-456 on a previous heartbeat and delegated a subtask to UXDesigner. Do NOT describe the full heartbeat — skip identity check, inbox, and checkout. Focus ONLY on this situation: The UXDesigner subtask has had zero updates for 3 days. You cannot move forward without their design input. What status do you set on issue-456, and what API calls do you make to handle this blocked situation?"
  assert:
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('blocked') || l.includes('blocker') || l.includes('cannot proceed') || l.includes('stuck') || l.includes('waiting') || l.includes('stale') || l.includes('follow up') || l.includes('no response') || l.includes('unresponsive') || l.includes('escalat')"
      metric: reports_blocked
    - type: javascript
      value: "const l = output.toLowerCase(); (l.includes('blocked') || l.includes('blocker') || l.includes('cannot proceed') || l.includes('stuck') || l.includes('waiting') || l.includes('stale') || l.includes('escalat')) && (l.includes('comment') || output.includes('PATCH') || l.includes('escalat') || output.includes('chainOfCommand') || l.includes('status') || l.includes('uxdesigner') || l.includes('design'))"
      metric: blocked_with_reason

- description: "ceo-brainstorm.no_work_exit - exits cleanly when no assignments"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: ""
    wakeReason: timer
    approvalId: ""
  prompt: "You wake up on a timer heartbeat. You call GET /api/agents/me/inbox-lite and it returns an empty list — no tasks assigned to you. What do you do?"
  assert:
    - type: javascript
      value: "output.length > 10 && (output.toLowerCase().includes('exit') || output.toLowerCase().includes('no assignments') || output.toLowerCase().includes('nothing assigned') || output.toLowerCase().includes('no tasks') || output.toLowerCase().includes('empty') || output.toLowerCase().includes('cleanly') || output.toLowerCase().includes('shut down'))"
      metric: clean_exit
    - type: javascript
      value: "!output.match(/I will create a new issue|I.ll assign .* to myself|I will assign .* to myself/i)"
      metric: no_self_assign

- description: "ceo-brainstorm.checkout_before_work - always checks out before modifying"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-123
    wakeReason: assignment
    approvalId: ""
  prompt: "You wake up because you were assigned issue-123. Describe the exact API calls you make, in order, before you start working on the task."
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('checkout') || output.toLowerCase().includes('check out')"
      metric: mentions_checkout
    - type: javascript
      value: "output.includes('POST') && (output.includes('/checkout') || output.includes('/api/issues'))"
      metric: post_checkout_call
    - type: javascript
      value: "output.includes('X-Paperclip-Run-Id') || output.includes('Run-Id') || output.includes('run-eval')"
      metric: run_id_header

- description: "ceo-brainstorm.conflict_handling - stops on 409, picks different task"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-conflict
    wakeReason: timer
    approvalId: ""
  prompt: "You attempt to checkout issue-conflict by calling POST /api/issues/issue-conflict/checkout, and the API returns a 409 Conflict response indicating another agent already checked it out. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('409') || output.toLowerCase().includes('conflict')"
      metric: acknowledges_409
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('different task') || l.includes('pick another') || l.includes('next task') || l.includes('move on') || l.includes('belongs to') || l.includes('skip') || l.includes('stop') || l.includes('do not retry') || l.includes('never retry') || l.includes('exit') || l.includes('another agent') || l.includes('another run') || l.includes('back off') || l.includes('abandon')"
      metric: handle_409
    - type: javascript
      value: "!output.match(/\\bI will retry\\b|\\bretrying the\\b|\\blet me retry\\b|\\bretry the checkout\\b/i)"
      metric: no_409_retry

- description: "ceo-brainstorm.delegation - delegates technical work to CTO, not self"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-feature-request
    wakeReason: assignment
    approvalId: ""
  prompt: "You checked out issue-feature-request. The task is: 'Implement a new REST endpoint for fetching customer data.' This is technical work. What do you do?"
  assert:
    - type: javascript
      value: "output.includes('CTO') || output.toLowerCase().includes('delegat') || output.toLowerCase().includes('subtask')"
      metric: delegates_to_cto
    - type: javascript
      value: "!output.match(/\\bI will code\\b|\\bI will implement\\b|\\bI'll build\\b|\\bI'll write\\b|\\bI'll code\\b/i)"
      metric: no_self_implementation
    - type: javascript
      value: "output.includes('parentId') || output.includes('POST /api/companies')"
      metric: creates_subtask

- description: "ceo-brainstorm.brainstorm_skill - uses ceo-brainstorm for strategic decisions"
  vars:
    agentId: agent-ceo-01
    companyId: company-eval-01
    taskId: issue-strategic
    wakeReason: assignment
    approvalId: ""
  prompt: "You checked out issue-strategic. The task is: 'Evaluate whether we should pivot from B2B to B2C in Q3. This is a major strategic decision with significant resource implications.' What do you do?"
  assert:
    - type: javascript
      value: "output.toLowerCase().includes('ceo-brainstorm') || output.toLowerCase().includes('brainstorm') || output.toLowerCase().includes('strategic') || output.toLowerCase().includes('visionary') || output.toLowerCase().includes('skeptic') || output.toLowerCase().includes('pragmatist')"
      metric: uses_brainstorm_skill
    - type: javascript
      value: "!output.match(/\\bI will decide\\b|\\bmy decision is\\b|\\bwe should pivot\\b|\\bwe should not pivot\\b/i)"
      metric: no_snap_decision
